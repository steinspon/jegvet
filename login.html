<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sign In | JegVet</title>
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JegVet" />
  <link rel="icon" type="image/png" sizes="32x32" href="logo_day_small_fixed.png?v=4" />
  <link rel="apple-touch-icon" sizes="180x180" href="logo_day_small_fixed.png?v=4" />
  <link rel='manifest' href='manifest.webmanifest' />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="auth-guard.js" defer></script>
  <script src="app-shell.js" defer></script>
</head>
<body data-i18n-title="page_title_login" data-page="login">
  <main class="page page-top">
    <section class="layout-card">
      <a href="index.html" class="brand-link" aria-label="Go to homepage">
        <img src="logo_day.png" alt="JegVet logo" class="brand-logo" />
      </a>

      <h1>Sign In</h1>
      <p class="helper-text">Sign in with Google, or use your email.</p>

      <button id="login-google" type="button" class="google-signin-button">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.652 32.657 29.243 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.957 3.043l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"></path>
          <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.957 3.043l5.657-5.657C34.046 6.053 29.268 4 24 4c-7.682 0-14.347 4.337-17.694 10.691z"></path>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.148 35.091 26.697 36 24 36c-5.221 0-9.617-3.329-11.283-7.946l-6.522 5.025C9.499 39.556 16.227 44 24 44z"></path>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.048 12.048 0 0 1-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"></path>
        </svg>
        <span>Continue with Google</span>
      </button>
      <p class="helper-text">or</p>

      <form id="login-form" class="main-form" novalidate>
        <label for="login-email" class="sr-only">Email</label>
        <input id="login-email" type="email" class="search-input" placeholder="Email" autocomplete="email" required />

        <label for="login-password" class="sr-only">Password</label>
        <input id="login-password" type="password" class="search-input" placeholder="Password" autocomplete="current-password" required />

        <button id="login-submit" type="submit" class="action-button">Sign in with email</button>
        <button id="login-mode-toggle" type="button" class="button">Create account</button>
        <p id="login-message" class="auth-error" aria-live="polite"></p>
      </form>
    </section>
  </main>
</body>
</html>
