    (function () {
      'use strict';
      var corpusPromise = null;
      var corpusCacheKey = 'jegvet-search-corpus-v1';
      var corpusCacheTtlMs = 6 * 60 * 60 * 1000;

      function t(key, fallback) {
        if (window.JegVetLang && typeof window.JegVetLang.t === 'function') {
          return window.JegVetLang.t(key, fallback);
        }
        return fallback || key;
      }

      function template(key, fallback, params) {
        if (window.JegVetLang && typeof window.JegVetLang.template === 'function') {
          return window.JegVetLang.template(key, fallback, params);
        }
        var text = fallback || key;
        return text.replace(/\{([a-zA-Z0-9_]+)\}/g, function (_, paramKey) {
          return Object.prototype.hasOwnProperty.call(params, paramKey) ? String(params[paramKey]) : '';
        });
      }

      function escapeHtml(text) {
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }


      function foldNordic(text, mode) {
        var value = String(text || '');
        if (mode === 'keyboard') {
          return value
            .replace(/[\u00C6\u00E6]/g, 'ae')
            .replace(/[\u00D8\u00F8]/g, 'oe')
            .replace(/[\u00C5\u00E5]/g, 'aa');
        }
        if (mode === 'simple') {
          return value
            .replace(/[\u00C6\u00E6]/g, 'e')
            .replace(/[\u00D8\u00F8]/g, 'o')
            .replace(/[\u00C5\u00E5]/g, 'a');
        }
        return value
          .replace(/[\u00C6\u00E6]/g, 'ae')
          .replace(/[\u00D8\u00F8]/g, 'o')
          .replace(/[\u00C5\u00E5]/g, 'aa');
      }
      function normalizeForSearch(text, mode) {
        var value = foldNordic(text, mode).toLowerCase();
        if (typeof value.normalize === 'function') {
          value = value.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        }
        return value;
      }
      function buildSearchVariants(text) {
        var variants = [
          normalizeForSearch(text, 'canonical'),
          normalizeForSearch(text, 'keyboard'),
          normalizeForSearch(text, 'simple')
        ].filter(Boolean);
        return Array.from(new Set(variants));
      }
      function stripMarkdown(markdown) {
        return markdown
          .replace(/```[\s\S]*?```/g, ' ')
          .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, ' $1 ')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, ' $1 ')
          .replace(/[`*_>#-]/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function stripHtml(html) {
        return html
          .replace(/<script[\s\S]*?<\/script>/gi, ' ')
          .replace(/<style[\s\S]*?<\/style>/gi, ' ')
          .replace(/<[^>]+>/g, ' ')
          .replace(/&nbsp;/gi, ' ')
          .replace(/&amp;/gi, '&')
          .replace(/&lt;/gi, '<')
          .replace(/&gt;/gi, '>')
          .replace(/&quot;/gi, '"')
          .replace(/&#39;/gi, "'")
          .replace(/\s+/g, ' ')
          .trim();
      }

      function tokenize(text) {
        return normalizeForSearch(text)
          .split(/[^a-z0-9]+/)
          .filter(Boolean);
      }

      function tokenVariants(token) {
        var variants = new Set([token]);
        if (token.indexOf('oe') !== -1) {
          variants.add(token.replace(/oe/g, 'o'));
        }
        if (token.indexOf('ae') !== -1) {
          variants.add(token.replace(/ae/g, 'e'));
        }
        if (token.indexOf('aa') !== -1) {
          variants.add(token.replace(/aa/g, 'a'));
        }
        return Array.from(variants);
      }

      var querySynonyms = {
        katt: ['cat', 'feline', 'cats'],
        cat: ['katt', 'feline', 'cats'],
        feline: ['katt', 'cat', 'cats'],
        hund: ['dog', 'canine', 'dogs'],

        renal: ['nyre', 'kidney', 'ckd'],
        oppkast: ['vomiting', 'emesis'],
        vomiting: ['oppkast', 'emesis'],
        emesis: ['oppkast', 'vomiting'],
        kronisk: ['chronic'],
        chronic: ['kronisk']
      };

      function synonymVariants(token) {
        var variants = new Set([token]);
        var related = querySynonyms[token] || [];
        for (var i = 0; i < related.length; i += 1) {
          variants.add(related[i]);
        }
        return Array.from(variants);
      }

      function slugify(text) {
        return normalizeForSearch(text)
          .replace(/[^a-z0-9\s-]/g, '')
          .trim()
          .replace(/\s+/g, '-') || 'section';
      }

      function buildSnippet(text, queryTokens) {
        if (!text) {
          return '';
        }
        var lower = text.toLowerCase();
        var firstIndex = -1;
        queryTokens.forEach(function (token) {
          var i = lower.indexOf(token);
          if (i !== -1 && (firstIndex === -1 || i < firstIndex)) {
            firstIndex = i;
          }
        });

        if (firstIndex === -1) {
          return text.slice(0, 170) + (text.length > 170 ? '...' : '');
        }

        var start = Math.max(0, firstIndex - 70);
        var end = Math.min(text.length, firstIndex + 140);
        var snippet = text.slice(start, end).trim();
        if (start > 0) {
          snippet = '...' + snippet;
        }
        if (end < text.length) {
          snippet += '...';
        }
        return snippet;
      }

      function normalizeManifestFromLegacyNav(navData) {
        var pages = [];
        navData.sections.forEach(function (section) {
          section.pages.forEach(function (page) {
            pages.push({
              file: page.file,
              title: page.title,
              folder: section.label.toLowerCase().replace(/\s+/g, '-')
            });
          });
        });

        return {
          title: navData.title || 'Veterinary Reference Wiki',
          pages: pages
        };
      }

      function humanizeFolder(folder) {
        return (folder || 'general')
          .split('/')
          .map(function (part) {
            return part
              .split('-')
              .map(function (word) {
                return word ? word.charAt(0).toUpperCase() + word.slice(1) : '';
              })
              .join(' ');
          })
          .join(' > ');
      }

      function humanizeFileName(fileName) {
        return fileName
          .replace(/\.md$/i, '')
          .replace(/[-_]+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim()
          .split(' ')
          .map(function (part) {
            if (!part) {
              return '';
            }
            return part.charAt(0).toUpperCase() + part.slice(1);
          })
          .join(' ');
      }

      function getGitHubRepoContext() {
        if (window.WIKI_GITHUB_REPO && window.WIKI_GITHUB_REPO.owner && window.WIKI_GITHUB_REPO.repo) {
          return {
            owner: window.WIKI_GITHUB_REPO.owner,
            repo: window.WIKI_GITHUB_REPO.repo
          };
        }

        var host = window.location.hostname || '';
        if (!/\.github\.io$/i.test(host)) {
          return null;
        }

        var owner = host.split('.')[0];
        var parts = window.location.pathname.split('/').filter(Boolean);
        if (!parts.length) {
          return null;
        }

        return {
          owner: owner,
          repo: parts[0]
        };
      }

      async function loadManifestFromGitHub() {
        var repoContext = getGitHubRepoContext();
        if (!repoContext) {
          throw new Error('No GitHub repository context');
        }

        var apiBase = 'https://api.github.com/repos/' + encodeURIComponent(repoContext.owner) + '/' + encodeURIComponent(repoContext.repo);
        var repoResponse = await fetch(apiBase, { headers: { Accept: 'application/vnd.github+json' } });
        if (!repoResponse.ok) {
          throw new Error('Could not load repository metadata from GitHub API');
        }
        var repoData = await repoResponse.json();
        var branch = repoData.default_branch || 'main';

        var treeResponse = await fetch(apiBase + '/git/trees/' + encodeURIComponent(branch) + '?recursive=1', {
          headers: { Accept: 'application/vnd.github+json' }
        });
        if (!treeResponse.ok) {
          throw new Error('Could not load repository tree from GitHub API');
        }
        var treeData = await treeResponse.json();
        var items = treeData.tree || [];

        var pages = items
          .filter(function (item) {
            return item.type === 'blob' && /^wiki\/content\/.+\.md$/i.test(item.path);
          })
          .map(function (item) {
            var relative = item.path.replace(/^wiki\/content\//i, '');
            var slashIndex = relative.lastIndexOf('/');
            var folder = slashIndex === -1 ? 'General' : relative.slice(0, slashIndex);
            var fileName = slashIndex === -1 ? relative : relative.slice(slashIndex + 1);

            return {
              file: relative,
              title: humanizeFileName(fileName),
              folder: folder
            };
          })
          .sort(function (a, b) {
            return a.file.localeCompare(b.file, undefined, { sensitivity: 'base' });
          });

        return {
          title: 'Veterinary Reference Wiki',
          generatedAt: new Date().toISOString(),
          pages: pages
        };
      }

      async function loadManifestData() {
        try {
          return await loadManifestFromGitHub();
        } catch (githubError) {
          // Fall through to static manifest/fallback for local dev or API failures.
        }

        try {
          var response = await fetch('wiki/data/content-manifest.json');
          if (!response.ok) {
            throw new Error('Could not load content-manifest.json');
          }
          return await response.json();
        } catch (error) {
          if (window.WIKI_FALLBACK && window.WIKI_FALLBACK.manifest) {
            return window.WIKI_FALLBACK.manifest;
          }
          if (window.WIKI_FALLBACK && window.WIKI_FALLBACK.nav) {
            return normalizeManifestFromLegacyNav(window.WIKI_FALLBACK.nav);
          }
          throw error;
        }
      }

        } catch (error) {

          }
          throw error;
        }

      function splitMarkdownSections(markdown) {
        var lines = markdown.replace(/\r/g, '').split('\n');
        var sections = [];
        var currentTitle = 'Overview';
        var currentLines = [];

        lines.forEach(function (line) {
          var match = line.match(/^#{1,3}\s+(.+)/);
          if (match) {
            if (currentLines.length) {
              sections.push({ heading: currentTitle, body: currentLines.join('\n') });
            }
            currentTitle = match[1].trim();
            currentLines = [];
            return;
          }
          currentLines.push(line);
        });

        if (currentLines.length) {
          sections.push({ heading: currentTitle, body: currentLines.join('\n') });
        }

        return sections;
      }

      function scoreDocument(doc, queryVariants, queryTokenGroups) {
        var title = doc.normTitle;
        var body = doc.normBody;
        var score = 0;
        var hasExactTitleMatch = queryVariants.some(function (query) { return title.indexOf(query) !== -1; });
        var hasExactBodyMatch = queryVariants.some(function (query) { return body.indexOf(query) !== -1; });

        if (hasExactTitleMatch) {
          score += 80;
        }
        if (hasExactBodyMatch) {
          score += 30;
        }

        queryTokenGroups.forEach(function (tokenGroup) {
          var titleHits = 0;
          var bodyHits = 0;
          tokenGroup.forEach(function (token) {
            var tHits = (title.match(new RegExp(token, 'g')) || []).length;
            var bHits = (body.match(new RegExp(token, 'g')) || []).length;
            if (tHits > titleHits) {
              titleHits = tHits;
            }
            if (bHits > bodyHits) {
              bodyHits = bHits;
            }
          });
          score += (titleHits * 25) + (bodyHits * 4);
        });

        // Prefer precise section matches above broad page-level matches.
        if (doc.kind === 'section' && hasExactBodyMatch) {
          score += 18;
        }
        if (doc.kind === 'page' && !hasExactTitleMatch && hasExactBodyMatch) {
          score -= 8;
        }

        return score;
      }

      function isMatch(doc, queryVariants, queryTokenGroups) {
        var title = doc.normTitle;
        var body = doc.normBody;
        var haystack = title + ' ' + body;
        var hasExactPhrase = queryVariants.some(function (query) { return haystack.indexOf(query) !== -1; });

        if (hasExactPhrase) {
          return true;
        }

        for (var i = 0; i < queryTokenGroups.length; i += 1) {
          var tokenGroup = queryTokenGroups[i];
          var groupHasMatch = tokenGroup.some(function (token) {
            return haystack.indexOf(token) !== -1;
          });
          if (!groupHasMatch) {
            return false;
          }
        }
        return true;
      }

      function renderResults(results, query, summaryEl, resultsEl) {
        if (!query) {
          summaryEl.textContent = t('search_type_prompt', 'Type a search term and press Enter.');
          resultsEl.innerHTML = '';
          return;
        }

        summaryEl.textContent = template(
          results.length === 1 ? 'search_result_singular' : 'search_result_plural',
          results.length === 1 ? '{count} result for "{query}"' : '{count} results for "{query}"',
          { count: results.length, query: query }
        );

        if (!results.length) {
          resultsEl.innerHTML = '<p class="search-empty">' + escapeHtml(t('search_empty', 'No matches found.')) + '</p>';
          return;
        }

        function withHitQuery(url, q) {
          if (!q || url.indexOf('wiki.html') !== 0) {
            return url;
          }
          var hashIndex = url.indexOf('#');
          var hash = hashIndex === -1 ? '' : url.slice(hashIndex);
          var base = hashIndex === -1 ? url : url.slice(0, hashIndex);
          var sep = base.indexOf('?') === -1 ? '?' : '&';
          return base + sep + 'hit=' + encodeURIComponent(q) + hash;
        }

        resultsEl.innerHTML = results.slice(0, 20).map(function (result) {
          var targetUrl = withHitQuery(result.url, query);
          return (
            '<article class="search-result">' +
              '<a class="search-result-url" href="' + targetUrl + '">' + escapeHtml(result.displayUrl) + '</a>' +
              '<h2 class="search-result-title"><a href="' + targetUrl + '">' + escapeHtml(result.title) + '</a></h2>' +
              '<p class="search-result-snippet">' + escapeHtml(result.snippet) + '</p>' +
            '</article>'
          );
        }).join('');
      }

          'about.html'
        ];

        for (var t = 0; t < toolPages.length; t += 1) {
          var toolFile = toolPages[t];
          try {
            var html = await loadHtmlDocument(toolFile);
            var titleMatch = html.match(/<title>([\s\S]*?)<\/title>/i);
            var title = titleMatch ? stripHtml(titleMatch[1]) : humanizeFileName(toolFile.replace(/\.html$/i, ''));
            var bodyText = stripHtml(html);
            if (!bodyText) {
              continue;
            }
            corpus.push({
              kind: 'tool',
              title: title,
              body: bodyText + ' tools calculator calculators anaesthetic anesthesia rabbit guinea pig chinchilla seagull sedation euthanasia dog cat bird avian',
              url: toolFile,
              displayUrl: toolFile
            });
          } catch (error) {
            // Skip missing/failed tool pages and continue indexing.
          }
        }

        var manifest = await loadManifestData();
        for (var p = 0; p < manifest.pages.length; p += 1) {
          var page = manifest.pages[p];
          var markdown = await loadMarkdown(page.file);
          var pageBody = stripMarkdown(markdown);

          if (pageBody) {
            corpus.push({
              kind: 'page',
              title: page.title,
              body: pageBody + ' ' + humanizeFolder(page.folder),
              url: 'wiki.html?page=' + encodeURIComponent(page.file),
              displayUrl: 'wiki.html?page=' + page.file
            });
          }

          var sections = splitMarkdownSections(markdown);
          for (var i = 0; i < sections.length; i += 1) {
            var sec = sections[i];
            var cleaned = stripMarkdown(sec.body);
            if (!cleaned) {
              continue;
            }
            var hash = slugify(sec.heading);
            corpus.push({
              kind: 'section',
              title: page.title + ' - ' + sec.heading,
              body: cleaned + ' ' + humanizeFolder(page.folder),
              url: 'wiki.html?page=' + encodeURIComponent(page.file) + '#' + encodeURIComponent(hash),
              displayUrl: 'wiki.html?page=' + page.file + '#' + hash
            });
          }

          if (page.folder && page.folder !== 'General') {
            var parts = page.folder.split('/').filter(Boolean);
            for (var f = 0; f < parts.length; f += 1) {
              var folderPath = parts.slice(0, f + 1).join('/');
              if (!folderMap[folderPath]) {
                folderMap[folderPath] = true;
                var humanFolder = humanizeFolder(folderPath);
                corpus.push({
                  title: humanFolder + ' Folder',
                  body: humanFolder + ' ' + folderPath.replace(/\//g, ' '),
                  url: 'wiki.html?page=' + encodeURIComponent(page.file),
                  displayUrl: 'wiki.html#folder=' + folderPath
                });
              }
            }
          }
        }
        return corpus.map(function (doc) {
          var title = doc.title || '';
          var body = doc.body || '';
          return {
            kind: doc.kind || '',
            title: title,
            body: body,
            url: doc.url,
            displayUrl: doc.displayUrl,
            normTitle: normalizeForSearch(title),
            normBody: normalizeForSearch(body)
          };
        });
      }

      function readCachedCorpus() {
        try {
          var raw = window.sessionStorage.getItem(corpusCacheKey);
          if (!raw) {
            return null;
          }
          var parsed = JSON.parse(raw);
          if (!parsed || !Array.isArray(parsed.corpus)) {
            return null;
          }
          if (!parsed.expiresAt || Date.now() > parsed.expiresAt) {
            window.sessionStorage.removeItem(corpusCacheKey);
            return null;
          }
          return parsed.corpus;
        } catch (error) {
          return null;
        }
      }

      function writeCachedCorpus(corpus) {
        try {
          window.sessionStorage.setItem(corpusCacheKey, JSON.stringify({
            expiresAt: Date.now() + corpusCacheTtlMs,
            corpus: corpus
          }));
        } catch (error) {
          // Ignore storage errors.
        }
      }

      function getCorpus() {
        if (corpusPromise) {
          return corpusPromise;
        }

        var cached = readCachedCorpus();
        if (cached) {
          corpusPromise = Promise.resolve(cached);
          return corpusPromise;
        }

        corpusPromise = buildCorpus().then(function (corpus) {
          writeCachedCorpus(corpus);
          return corpus;
        }).catch(function (error) {
          corpusPromise = null;
          throw error;
        });
        return corpusPromise;
      }

      async function runSearch() {
        var params = new URLSearchParams(window.location.search);
        var query = (params.get('q') || '').trim();
        var queryVariants = buildSearchVariants(query);
        var queryNormalized = queryVariants[0] || '';
        var queryTokens = tokenize(queryNormalized);
        var queryTokenGroups = queryTokens.map(function (token) {
          var synonymTerms = synonymVariants(token);
          var expanded = [];
          synonymTerms.forEach(function (term) {
            tokenVariants(term).forEach(function (variant) {
              expanded.push(variant);
            });
          });
          return Array.from(new Set(expanded));
        });

        var input = document.querySelector('input[name="q"]');
        var summary = document.getElementById('search-summary');
        var resultsEl = document.getElementById('search-results');

        if (input) {
          input.value = query;
        }

        if (!queryTokens.length) {
          renderResults([], '', summary, resultsEl);
          return;
        }

        var corpus = await getCorpus();
        var ranked = corpus
          .map(function (doc) {
            var score = scoreDocument(doc, queryVariants, queryTokenGroups);
            return {
              title: doc.title,
              url: doc.url,
              displayUrl: doc.displayUrl,
              snippet: buildSnippet(doc.body, queryTokens),
              score: score,
              isMatch: isMatch(doc, queryVariants, queryTokenGroups)
            };
          })
          .filter(function (doc) {
            return doc.score > 0 && doc.isMatch;
          })
          .sort(function (a, b) {
            return b.score - a.score;
          });

        renderResults(ranked, query, summary, resultsEl);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', runSearch);
      } else {
        runSearch();
      }
      document.addEventListener('jegvet:langchange', runSearch);
    })();
  </script>
</body>
