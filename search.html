<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Search | JegVet</title>
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JegVet" />
  <link rel="icon" type="image/png" sizes="32x32" href="logo_day_small_fixed.png?v=4" />
  <link rel="apple-touch-icon" sizes="180x180" href="logo_day_small_fixed.png?v=4" />
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="logo_day_small_fixed.png?v=4" />
  <link rel='manifest' href='manifest.webmanifest' />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="app-shell.js" defer></script>
  <script src="wiki/data/wiki-fallback.js" defer></script>
  <script src="search-engine.js" defer></script>
  <script>
    window.PAGE_I18N = {
      en: {
        page_title_search: 'Search | JegVet',
        search_placeholder: 'Search...',
        search_aria: 'Search',
        search_waiting: 'Search results will appear here.',
        search_type_prompt: 'Type a search term and press Enter.',
        search_searching: 'Searching...',
        search_result_singular: '{count} result for "{query}"',
        search_result_plural: '{count} results for "{query}"',
        search_empty: 'No matches found.'
      },
      no: {
        page_title_search: 'Søk | JegVet',
        search_placeholder: 'Søk...',
        search_aria: 'Søk',
        search_waiting: 'Søkeresultater vises her.',
        search_type_prompt: 'Skriv et søkeord og trykk Enter.',
        search_searching: 'Søker...',
        search_result_singular: '{count} treff for "{query}"',
        search_result_plural: '{count} treff for "{query}"',
        search_empty: 'Ingen treff funnet.'
      }
    };
  </script>
</head>
<body data-i18n-title="page_title_search" data-page="search">
  <main class="page page-top">
    <section class="layout-card layout-card-wide">
      <a href="index.html" class="brand-link" aria-label="Go to homepage">
        <img src="logo_day.png" alt="JegVet logo" class="brand-logo" />
      </a>

      <form class="main-form" action="search.html" method="get">
        <input
          type="search"
          name="q"
          class="search-input"
          placeholder="Search..."
          aria-label="Search"
          data-i18n-placeholder="search_placeholder"
          data-i18n-aria-label="search_aria"
        />
      </form>

      <section aria-live="polite" class="search-results-wrap">
        <p id="search-summary" class="search-summary" data-i18n="search_waiting">Search results will appear here.</p>
        <div id="search-results"></div>
      </section>
    </section>
  </main>

  <script src="tools-data.js"></script>
  <script>
    (function () {
      'use strict';

      // Documents are gathered at runtime from the live content (core pages, the
      // shared tool catalogue and the wiki) and matched with the JegVetSearch
      // engine. Nothing here lists individual calculators, so the index cannot
      // drift out of sync when calculators or wiki pages are added.

      var docsCacheKey = 'jegvet-search-docs-v3';
      var docsCacheTtlMs = 6 * 60 * 60 * 1000;
      var docsPromise = null;

      function t(key, fallback) {
        if (window.JegVetLang && typeof window.JegVetLang.t === 'function') {
          return window.JegVetLang.t(key, fallback);
        }
        return fallback || key;
      }

      function template(key, fallback, params) {
        if (window.JegVetLang && typeof window.JegVetLang.template === 'function') {
          return window.JegVetLang.template(key, fallback, params);
        }
        var text = fallback || key;
        return text.replace(/\{([a-zA-Z0-9_]+)\}/g, function (_, paramKey) {
          return Object.prototype.hasOwnProperty.call(params, paramKey) ? String(params[paramKey]) : '';
        });
      }

      function escapeHtml(text) {
        return String(text == null ? '' : text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function escapeRegExp(text) {
        return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      }

      function highlight(escapedText, rawTokens) {
        var terms = (rawTokens || []).filter(Boolean).map(escapeRegExp);
        if (!terms.length) {
          return escapedText;
        }
        try {
          return escapedText.replace(new RegExp('(' + terms.join('|') + ')', 'gi'), '<mark>$1</mark>');
        } catch (error) {
          return escapedText;
        }
      }

      function stripMarkdown(markdown) {
        return String(markdown || '')
          .replace(/```[\s\S]*?```/g, ' ')
          .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, ' $1 ')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, ' $1 ')
          .replace(/[`*_>#-]/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function stripHtml(html) {
        return String(html || '')
          .replace(/<script[\s\S]*?<\/script>/gi, ' ')
          .replace(/<style[\s\S]*?<\/style>/gi, ' ')
          .replace(/<[^>]+>/g, ' ')
          .replace(/&nbsp;/gi, ' ')
          .replace(/&amp;/gi, '&')
          .replace(/&lt;/gi, '<')
          .replace(/&gt;/gi, '>')
          .replace(/&quot;/gi, '"')
          .replace(/&#39;/gi, "'")
          .replace(/\s+/g, ' ')
          .trim();
      }

      function slugify(text) {
        return window.JegVetSearch.normalize(text)
          .replace(/[^a-z0-9\s-]/g, '')
          .trim()
          .replace(/\s+/g, '-') || 'section';
      }

      function normalizeManifestFromLegacyNav(navData) {
        var pages = [];
        navData.sections.forEach(function (section) {
          section.pages.forEach(function (page) {
            pages.push({
              file: page.file,
              title: page.title,
              folder: section.label.toLowerCase().replace(/\s+/g, '-')
            });
          });
        });
        return {
          title: navData.title || 'Veterinary Reference Wiki',
          pages: pages
        };
      }

      function humanizeFolder(folder) {
        return (folder || 'general')
          .split('/')
          .map(function (part) {
            return part
              .split('-')
              .map(function (word) {
                return word ? word.charAt(0).toUpperCase() + word.slice(1) : '';
              })
              .join(' ');
          })
          .join(' > ');
      }

      function humanizeFileName(fileName) {
        return fileName
          .replace(/\.(md|html)$/i, '')
          .replace(/[-_]+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim()
          .split(' ')
          .map(function (part) {
            return part ? part.charAt(0).toUpperCase() + part.slice(1) : '';
          })
          .join(' ');
      }

      function getGitHubRepoContext() {
        if (window.WIKI_GITHUB_REPO && window.WIKI_GITHUB_REPO.owner && window.WIKI_GITHUB_REPO.repo) {
          return { owner: window.WIKI_GITHUB_REPO.owner, repo: window.WIKI_GITHUB_REPO.repo };
        }
        var host = window.location.hostname || '';
        if (!/\.github\.io$/i.test(host)) {
          return null;
        }
        var owner = host.split('.')[0];
        var parts = window.location.pathname.split('/').filter(Boolean);
        if (!parts.length) {
          return null;
        }
        return { owner: owner, repo: parts[0] };
      }

      async function loadManifestFromGitHub() {
        var repoContext = getGitHubRepoContext();
        if (!repoContext) {
          throw new Error('No GitHub repository context');
        }
        var apiBase = 'https://api.github.com/repos/' + encodeURIComponent(repoContext.owner) + '/' + encodeURIComponent(repoContext.repo);
        var repoResponse = await fetch(apiBase, { headers: { Accept: 'application/vnd.github+json' } });
        if (!repoResponse.ok) {
          throw new Error('Could not load repository metadata from GitHub API');
        }
        var repoData = await repoResponse.json();
        var branch = repoData.default_branch || 'main';
        var treeResponse = await fetch(apiBase + '/git/trees/' + encodeURIComponent(branch) + '?recursive=1', {
          headers: { Accept: 'application/vnd.github+json' }
        });
        if (!treeResponse.ok) {
          throw new Error('Could not load repository tree from GitHub API');
        }
        var treeData = await treeResponse.json();
        var items = treeData.tree || [];
        var pages = items
          .filter(function (item) {
            return item.type === 'blob' && /^wiki\/content\/.+\.md$/i.test(item.path);
          })
          .map(function (item) {
            var relative = item.path.replace(/^wiki\/content\//i, '');
            var slashIndex = relative.lastIndexOf('/');
            var folder = slashIndex === -1 ? 'General' : relative.slice(0, slashIndex);
            var fileName = slashIndex === -1 ? relative : relative.slice(slashIndex + 1);
            return { file: relative, title: humanizeFileName(fileName), folder: folder };
          })
          .sort(function (a, b) {
            return a.file.localeCompare(b.file, undefined, { sensitivity: 'base' });
          });
        return { title: 'Veterinary Reference Wiki', pages: pages };
      }

      async function loadManifestData() {
        try {
          return await loadManifestFromGitHub();
        } catch (githubError) {
          // Fall through to the static manifest/fallback for local dev or API failures.
        }
        try {
          var response = await fetch('wiki/data/content-manifest.json');
          if (!response.ok) {
            throw new Error('Could not load content-manifest.json');
          }
          return await response.json();
        } catch (error) {
          if (window.WIKI_FALLBACK && window.WIKI_FALLBACK.manifest) {
            return window.WIKI_FALLBACK.manifest;
          }
          if (window.WIKI_FALLBACK && window.WIKI_FALLBACK.nav) {
            return normalizeManifestFromLegacyNav(window.WIKI_FALLBACK.nav);
          }
          throw error;
        }
      }

      async function loadMarkdown(file) {
        try {
          var response = await fetch('wiki/content/' + file);
          if (!response.ok) {
            throw new Error('Could not load ' + file);
          }
          return await response.text();
        } catch (error) {
          if (window.WIKI_FALLBACK && window.WIKI_FALLBACK.pages && window.WIKI_FALLBACK.pages[file]) {
            return window.WIKI_FALLBACK.pages[file];
          }
          throw error;
        }
      }

      async function loadHtmlDocument(file) {
        var response = await fetch(file);
        if (!response.ok) {
          throw new Error('Could not load ' + file);
        }
        return await response.text();
      }

      function splitMarkdownSections(markdown) {
        var lines = String(markdown || '').replace(/\r/g, '').split('\n');
        var sections = [];
        var currentTitle = 'Overview';
        var currentLines = [];
        lines.forEach(function (line) {
          var match = line.match(/^#{1,3}\s+(.+)/);
          if (match) {
            if (currentLines.length) {
              sections.push({ heading: currentTitle, body: currentLines.join('\n') });
            }
            currentTitle = match[1].trim();
            currentLines = [];
            return;
          }
          currentLines.push(line);
        });
        if (currentLines.length) {
          sections.push({ heading: currentTitle, body: currentLines.join('\n') });
        }
        return sections;
      }

      async function gatherDocs() {
        var docs = [];

        // Stable application pages.
        var htmlTargets = [
          { url: 'index.html', kind: '', extra: '', fallbackTitle: 'JegVet' },
          { url: 'wiki.html', kind: '', extra: '', fallbackTitle: 'Veterinary Reference Wiki' },
          { url: 'tools.html', kind: 'tool', extra: '', fallbackTitle: 'Tools & Calculators' },
          { url: 'about.html', kind: '', extra: '', fallbackTitle: 'About' }
        ];

        // Calculators discovered from the shared catalogue (single source of
        // truth). Each tool's bilingual label is folded into its body so e.g.
        // "avliving" finds the euthanasia tool even if the page text is English.
        var views = window.JEGVET_TOOLS_VIEWS || {};
        Object.keys(views).forEach(function (key) {
          var node = views[key];
          if (node && node.type === 'tool' && node.href) {
            var labels = node.labels || {};
            var labelText = [labels.en, labels.no].filter(Boolean).join(' ');
            htmlTargets.push({ url: node.href, kind: 'tool', extra: labelText, fallbackTitle: '' });
          }
        });

        for (var i = 0; i < htmlTargets.length; i += 1) {
          var target = htmlTargets[i];
          var fallbackTitle = target.fallbackTitle || humanizeFileName(target.url);
          try {
            var html = await loadHtmlDocument(target.url);
            var titleMatch = html.match(/<title>([\s\S]*?)<\/title>/i);
            var title = titleMatch ? stripHtml(titleMatch[1]) : fallbackTitle;
            var bodyText = stripHtml(html);
            docs.push({
              kind: target.kind,
              title: title,
              body: (bodyText + ' ' + target.extra).trim(),
              url: target.url,
              displayUrl: target.url
            });
          } catch (error) {
            // Even when a page can't be fetched (e.g. opened via file://), keep
            // it findable through its title and catalogue label.
            docs.push({
              kind: target.kind,
              title: fallbackTitle,
              body: target.extra,
              url: target.url,
              displayUrl: target.url
            });
          }
        }

        // Wiki reference content (pages and per-heading sections).
        try {
          var manifest = await loadManifestData();
          var pages = (manifest && manifest.pages) || [];
          for (var p = 0; p < pages.length; p += 1) {
            var page = pages[p];
            var markdown;
            try {
              markdown = await loadMarkdown(page.file);
            } catch (markdownError) {
              continue;
            }
            var pageBody = stripMarkdown(markdown);
            if (pageBody) {
              docs.push({
                kind: 'page',
                title: page.title,
                body: pageBody + ' ' + humanizeFolder(page.folder),
                url: 'wiki.html?page=' + encodeURIComponent(page.file),
                displayUrl: 'wiki.html?page=' + page.file
              });
            }
            var sections = splitMarkdownSections(markdown);
            for (var s = 0; s < sections.length; s += 1) {
              var section = sections[s];
              var cleaned = stripMarkdown(section.body);
              if (!cleaned) {
                continue;
              }
              var hash = slugify(section.heading);
              docs.push({
                kind: 'section',
                title: page.title + ' - ' + section.heading,
                body: cleaned + ' ' + humanizeFolder(page.folder),
                url: 'wiki.html?page=' + encodeURIComponent(page.file) + '#' + encodeURIComponent(hash),
                displayUrl: 'wiki.html?page=' + page.file + '#' + hash
              });
            }
          }
        } catch (wikiError) {
          // Wiki content is optional; tools and pages remain searchable.
        }

        return docs;
      }

      function readCachedDocs() {
        try {
          var raw = window.sessionStorage.getItem(docsCacheKey);
          if (!raw) {
            return null;
          }
          var parsed = JSON.parse(raw);
          if (!parsed || !Array.isArray(parsed.docs)) {
            return null;
          }
          if (!parsed.expiresAt || Date.now() > parsed.expiresAt) {
            window.sessionStorage.removeItem(docsCacheKey);
            return null;
          }
          return parsed.docs;
        } catch (error) {
          return null;
        }
      }

      function writeCachedDocs(docs) {
        try {
          window.sessionStorage.setItem(docsCacheKey, JSON.stringify({
            expiresAt: Date.now() + docsCacheTtlMs,
            docs: docs
          }));
        } catch (error) {
          // Ignore storage errors (private mode, quota, etc.).
        }
      }

      function getDocs() {
        if (docsPromise) {
          return docsPromise;
        }
        var cached = readCachedDocs();
        if (cached) {
          docsPromise = Promise.resolve(cached);
          return docsPromise;
        }
        docsPromise = gatherDocs().then(function (docs) {
          writeCachedDocs(docs);
          return docs;
        }).catch(function (error) {
          docsPromise = null;
          throw error;
        });
        return docsPromise;
      }

      function withHitQuery(url, q) {
        if (!q || url.indexOf('wiki.html') !== 0) {
          return url;
        }
        var hashIndex = url.indexOf('#');
        var hash = hashIndex === -1 ? '' : url.slice(hashIndex);
        var base = hashIndex === -1 ? url : url.slice(0, hashIndex);
        var sep = base.indexOf('?') === -1 ? '?' : '&';
        return base + sep + 'hit=' + encodeURIComponent(q) + hash;
      }

      function buildSnippet(text, rawTokens) {
        if (!text) {
          return '';
        }
        var lower = text.toLowerCase();
        var firstIndex = -1;
        rawTokens.forEach(function (token) {
          if (!token) {
            return;
          }
          var i = lower.indexOf(token);
          if (i !== -1 && (firstIndex === -1 || i < firstIndex)) {
            firstIndex = i;
          }
        });
        if (firstIndex === -1) {
          return text.slice(0, 170) + (text.length > 170 ? '...' : '');
        }
        var start = Math.max(0, firstIndex - 70);
        var end = Math.min(text.length, firstIndex + 140);
        var snippet = text.slice(start, end).trim();
        if (start > 0) {
          snippet = '...' + snippet;
        }
        if (end < text.length) {
          snippet += '...';
        }
        return snippet;
      }

      function renderResults(results, query, rawTokens, summaryEl, resultsEl) {
        summaryEl.textContent = template(
          results.length === 1 ? 'search_result_singular' : 'search_result_plural',
          results.length === 1 ? '{count} result for "{query}"' : '{count} results for "{query}"',
          { count: results.length, query: query }
        );

        if (!results.length) {
          resultsEl.innerHTML = '<p class="search-empty">' + escapeHtml(t('search_empty', 'No matches found.')) + '</p>';
          return;
        }

        resultsEl.innerHTML = results.map(function (result) {
          var targetUrl = withHitQuery(result.url, query);
          var snippet = buildSnippet(result.body, rawTokens);
          return (
            '<article class="search-result">' +
              '<a class="search-result-url" href="' + escapeHtml(targetUrl) + '">' + escapeHtml(result.displayUrl) + '</a>' +
              '<h2 class="search-result-title"><a href="' + escapeHtml(targetUrl) + '">' + highlight(escapeHtml(result.title), rawTokens) + '</a></h2>' +
              '<p class="search-result-snippet">' + highlight(escapeHtml(snippet), rawTokens) + '</p>' +
            '</article>'
          );
        }).join('');
      }

      async function runSearch() {
        var params = new URLSearchParams(window.location.search);
        var query = (params.get('q') || '').trim();
        var input = document.querySelector('input[name="q"]');
        var summary = document.getElementById('search-summary');
        var resultsEl = document.getElementById('search-results');
        var rawTokens = query.toLowerCase().split(/\s+/).filter(Boolean);

        if (input) {
          input.value = query;
        }

        if (!query) {
          summary.textContent = t('search_type_prompt', 'Type a search term and press Enter.');
          resultsEl.innerHTML = '';
          return;
        }

        if (!window.JegVetSearch) {
          summary.textContent = t('search_empty', 'No matches found.');
          resultsEl.innerHTML = '';
          return;
        }

        summary.textContent = t('search_searching', 'Searching...');

        var docs;
        try {
          docs = await getDocs();
        } catch (error) {
          docs = [];
        }

        var index = window.JegVetSearch.buildIndex(docs);
        var results = window.JegVetSearch.search(index, query, { limit: 20 });
        renderResults(results, query, rawTokens, summary, resultsEl);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', runSearch);
      } else {
        runSearch();
      }
      document.addEventListener('jegvet:langchange', runSearch);
    })();
  </script>
</body>
</html>
