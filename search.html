<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search | JegVet</title>
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="JegVet" />
  <link rel="icon" type="image/png" href="logo_day_small.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="logo_day_small.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="auth-guard.js" defer></script>
  <script src="wiki/data/wiki-fallback.js" defer></script>
  <style>
    .search-results-wrap {
      margin-top: 16px;
    }

    .search-summary {
      margin: 0 2px 10px;
      color: #6b7580;
      font-size: 15px;
    }

    .search-result {
      padding: 12px 2px;
      border-top: 1px solid #e6ebf0;
    }

    .search-result-url {
      color: #36566f;
      font-size: 13px;
      text-decoration: none;
      word-break: break-all;
    }

    .search-result-title {
      margin: 4px 0;
      font-size: 19px;
      line-height: 1.28;
      font-weight: 600;
    }

    .search-result-title a {
      color: #1f4b6e;
      text-decoration: none;
    }

    .search-result-title a:hover {
      text-decoration: underline;
    }

    .search-result-snippet {
      margin: 0;
      color: #344a5f;
      line-height: 1.45;
      font-size: 15px;
    }

    .search-empty {
      margin: 6px 2px 0;
      color: #6b7580;
    }
  </style>
</head>
<body>
  <main class="page page-top">
    <section class="layout-card layout-card-wide">
      <a href="index.html" class="brand-link" aria-label="Go to homepage">
        <img src="logo_day.png" alt="JegVet logo" class="brand-logo" />
      </a>

      <form class="main-form" action="search.html" method="get">
        <input
          type="search"
          name="q"
          class="search-input"
          placeholder="Search..."
          aria-label="Search"
        />
      </form>

      <section aria-live="polite" class="search-results-wrap">
        <p id="search-summary" class="search-summary">Search results will appear here.</p>
        <div id="search-results"></div>
      </section>
    </section>
  </main>

  <script>
    (function () {
      'use strict';

      function escapeHtml(text) {
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function stripMarkdown(markdown) {
        return markdown
          .replace(/```[\s\S]*?```/g, ' ')
          .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, ' $1 ')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, ' $1 ')
          .replace(/[`*_>#-]/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function tokenize(text) {
        return text
          .toLowerCase()
          .split(/[^a-z0-9]+/)
          .filter(Boolean);
      }

      function slugify(text) {
        return text
          .toLowerCase()
          .replace(/[^a-z0-9\s-]/g, '')
          .trim()
          .replace(/\s+/g, '-') || 'section';
      }

      function buildSnippet(text, queryTokens) {
        if (!text) {
          return '';
        }
        var lower = text.toLowerCase();
        var firstIndex = -1;
        queryTokens.forEach(function (token) {
          var i = lower.indexOf(token);
          if (i !== -1 && (firstIndex === -1 || i < firstIndex)) {
            firstIndex = i;
          }
        });

        if (firstIndex === -1) {
          return text.slice(0, 170) + (text.length > 170 ? '...' : '');
        }

        var start = Math.max(0, firstIndex - 70);
        var end = Math.min(text.length, firstIndex + 140);
        var snippet = text.slice(start, end).trim();
        if (start > 0) {
          snippet = '...' + snippet;
        }
        if (end < text.length) {
          snippet += '...';
        }
        return snippet;
      }

      function normalizeManifestFromLegacyNav(navData) {
        var pages = [];
        navData.sections.forEach(function (section) {
          section.pages.forEach(function (page) {
            pages.push({
              file: page.file,
              title: page.title,
              folder: section.label.toLowerCase().replace(/\s+/g, '-')
            });
          });
        });

        return {
          title: navData.title || 'Veterinary Reference Wiki',
          pages: pages
        };
      }

      function humanizeFolder(folder) {
        return (folder || 'general')
          .split('/')
          .map(function (part) {
            return part
              .split('-')
              .map(function (word) {
                return word ? word.charAt(0).toUpperCase() + word.slice(1) : '';
              })
              .join(' ');
          })
          .join(' > ');
      }

      function humanizeFileName(fileName) {
        return fileName
          .replace(/\.md$/i, '')
          .replace(/[-_]+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim()
          .split(' ')
          .map(function (part) {
            if (!part) {
              return '';
            }
            return part.charAt(0).toUpperCase() + part.slice(1);
          })
          .join(' ');
      }

      function getGitHubRepoContext() {
        if (window.WIKI_GITHUB_REPO && window.WIKI_GITHUB_REPO.owner && window.WIKI_GITHUB_REPO.repo) {
          return {
            owner: window.WIKI_GITHUB_REPO.owner,
            repo: window.WIKI_GITHUB_REPO.repo
          };
        }

        var host = window.location.hostname || '';
        if (!/\.github\.io$/i.test(host)) {
          return null;
        }

        var owner = host.split('.')[0];
        var parts = window.location.pathname.split('/').filter(Boolean);
        if (!parts.length) {
          return null;
        }

        return {
          owner: owner,
          repo: parts[0]
        };
      }

      async function loadManifestFromGitHub() {
        var repoContext = getGitHubRepoContext();
        if (!repoContext) {
          throw new Error('No GitHub repository context');
        }

        var apiBase = 'https://api.github.com/repos/' + encodeURIComponent(repoContext.owner) + '/' + encodeURIComponent(repoContext.repo);
        var repoResponse = await fetch(apiBase, { headers: { Accept: 'application/vnd.github+json' } });
        if (!repoResponse.ok) {
          throw new Error('Could not load repository metadata from GitHub API');
        }
        var repoData = await repoResponse.json();
        var branch = repoData.default_branch || 'main';

        var treeResponse = await fetch(apiBase + '/git/trees/' + encodeURIComponent(branch) + '?recursive=1', {
          headers: { Accept: 'application/vnd.github+json' }
        });
        if (!treeResponse.ok) {
          throw new Error('Could not load repository tree from GitHub API');
        }
        var treeData = await treeResponse.json();
        var items = treeData.tree || [];

        var pages = items
          .filter(function (item) {
            return item.type === 'blob' && /^wiki\/content\/.+\.md$/i.test(item.path);
          })
          .map(function (item) {
            var relative = item.path.replace(/^wiki\/content\//i, '');
            var slashIndex = relative.lastIndexOf('/');
            var folder = slashIndex === -1 ? 'General' : relative.slice(0, slashIndex);
            var fileName = slashIndex === -1 ? relative : relative.slice(slashIndex + 1);

            return {
              file: relative,
              title: humanizeFileName(fileName),
              folder: folder
            };
          })
          .sort(function (a, b) {
            return a.file.localeCompare(b.file, undefined, { sensitivity: 'base' });
          });

        return {
          title: 'Veterinary Reference Wiki',
          generatedAt: new Date().toISOString(),
          pages: pages
        };
      }

      async function loadManifestData() {
        try {
          return await loadManifestFromGitHub();
        } catch (githubError) {
          // Fall through to static manifest/fallback for local dev or API failures.
        }

        try {
          var response = await fetch('wiki/data/content-manifest.json?v=' + Date.now());
          if (!response.ok) {
            throw new Error('Could not load content-manifest.json');
          }
          return await response.json();
        } catch (error) {
          if (window.WIKI_FALLBACK && window.WIKI_FALLBACK.manifest) {
            return window.WIKI_FALLBACK.manifest;
          }
          if (window.WIKI_FALLBACK && window.WIKI_FALLBACK.nav) {
            return normalizeManifestFromLegacyNav(window.WIKI_FALLBACK.nav);
          }
          throw error;
        }
      }

      async function loadMarkdown(file) {
        try {
          var response = await fetch('wiki/content/' + file + '?v=' + Date.now());
          if (!response.ok) {
            throw new Error('Could not load ' + file);
          }
          return await response.text();
        } catch (error) {
          if (window.WIKI_FALLBACK && window.WIKI_FALLBACK.pages && window.WIKI_FALLBACK.pages[file]) {
            return window.WIKI_FALLBACK.pages[file];
          }
          throw error;
        }
      }

      function splitMarkdownSections(markdown) {
        var lines = markdown.replace(/\r/g, '').split('\n');
        var sections = [];
        var currentTitle = 'Overview';
        var currentLines = [];

        lines.forEach(function (line) {
          var match = line.match(/^#{1,3}\s+(.+)/);
          if (match) {
            if (currentLines.length) {
              sections.push({ heading: currentTitle, body: currentLines.join('\n') });
            }
            currentTitle = match[1].trim();
            currentLines = [];
            return;
          }
          currentLines.push(line);
        });

        if (currentLines.length) {
          sections.push({ heading: currentTitle, body: currentLines.join('\n') });
        }

        return sections;
      }

      function scoreDocument(doc, query, queryTokens) {
        var title = doc.title.toLowerCase();
        var body = doc.body.toLowerCase();
        var score = 0;

        if (title.indexOf(query) !== -1) {
          score += 80;
        }
        if (body.indexOf(query) !== -1) {
          score += 30;
        }

        queryTokens.forEach(function (token) {
          var titleHits = (title.match(new RegExp(token, 'g')) || []).length;
          var bodyHits = (body.match(new RegExp(token, 'g')) || []).length;
          score += (titleHits * 25) + (bodyHits * 4);
        });

        return score;
      }

      function renderResults(results, query, summaryEl, resultsEl) {
        if (!query) {
          summaryEl.textContent = 'Type a search term and press Enter.';
          resultsEl.innerHTML = '';
          return;
        }

        summaryEl.textContent = results.length + ' result' + (results.length === 1 ? '' : 's') + ' for "' + query + '"';

        if (!results.length) {
          resultsEl.innerHTML = '<p class="search-empty">No matches found.</p>';
          return;
        }

        resultsEl.innerHTML = results.slice(0, 20).map(function (result) {
          return (
            '<article class="search-result">' +
              '<a class="search-result-url" href="' + result.url + '">' + escapeHtml(result.displayUrl) + '</a>' +
              '<h2 class="search-result-title"><a href="' + result.url + '">' + escapeHtml(result.title) + '</a></h2>' +
              '<p class="search-result-snippet">' + escapeHtml(result.snippet) + '</p>' +
            '</article>'
          );
        }).join('');
      }

      async function buildCorpus() {
        var corpus = [
          {
            title: 'Home',
            body: 'Search Browse Reference Tools Calculators Veterinary Reference Wiki JegVet',
            url: 'index.html',
            displayUrl: 'index.html'
          },
          {
            title: 'Veterinary Reference Wiki',
            body: 'Internal knowledge base for protocols reminders and client communication notes',
            url: 'wiki.html',
            displayUrl: 'wiki.html'
          }
        ];

        var manifest = await loadManifestData();
        for (var p = 0; p < manifest.pages.length; p += 1) {
          var page = manifest.pages[p];
          var markdown = await loadMarkdown(page.file);
          var sections = splitMarkdownSections(markdown);
          for (var i = 0; i < sections.length; i += 1) {
            var sec = sections[i];
            var cleaned = stripMarkdown(sec.body);
            if (!cleaned) {
              continue;
            }
            var hash = slugify(sec.heading);
            corpus.push({
              title: page.title + ' - ' + sec.heading,
              body: cleaned + ' ' + humanizeFolder(page.folder),
              url: 'wiki.html?page=' + encodeURIComponent(page.file) + '#' + encodeURIComponent(hash),
              displayUrl: 'wiki.html?page=' + page.file + '#' + hash
            });
          }
        }

        return corpus;
      }

      async function runSearch() {
        var params = new URLSearchParams(window.location.search);
        var query = (params.get('q') || '').trim();
        var queryLower = query.toLowerCase();
        var queryTokens = tokenize(queryLower);

        var input = document.querySelector('input[name="q"]');
        var summary = document.getElementById('search-summary');
        var resultsEl = document.getElementById('search-results');

        if (input) {
          input.value = query;
        }

        if (!queryTokens.length) {
          renderResults([], '', summary, resultsEl);
          return;
        }

        var corpus = await buildCorpus();
        var ranked = corpus
          .map(function (doc) {
            var score = scoreDocument(doc, queryLower, queryTokens);
            return {
              title: doc.title,
              url: doc.url,
              displayUrl: doc.displayUrl,
              snippet: buildSnippet(doc.body, queryTokens),
              score: score
            };
          })
          .filter(function (doc) {
            return doc.score > 0;
          })
          .sort(function (a, b) {
            return b.score - a.score;
          });

        renderResults(ranked, query, summary, resultsEl);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', runSearch);
      } else {
        runSearch();
      }
    })();
  </script>
</body>
</html>
