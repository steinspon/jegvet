<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Journal | JegVet</title>
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JegVet" />
  <link rel="icon" type="image/png" sizes="32x32" href="logo_day_small_fixed.png?v=4" />
  <link rel="apple-touch-icon" sizes="180x180" href="logo_day_small_fixed.png?v=4" />
  <link rel='manifest' href='manifest.webmanifest' />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="auth-guard.js" defer></script>
  <script src="app-shell.js" defer></script>
</head>
<body>
  <main class="page page-top">
    <section class="layout-card layout-card-wide">
      <h1>Journal</h1>
      <p class="helper-text">Create and manage your own private entries.</p>

      <form id="journal-form" class="main-form" novalidate>
        <label for="journal-title">Title</label>
        <input id="journal-title" type="text" class="search-input" placeholder="Entry title" maxlength="120" required />

        <label for="journal-content">Entry</label>
        <textarea id="journal-content" class="search-input" rows="7" placeholder="Write your journal entry..."></textarea>

        <div class="journal-actions">
          <button id="journal-save" type="submit" class="action-button">Save entry</button>
          <button id="journal-new" type="button" class="button">New entry</button>
          <button id="journal-delete" type="button" class="button">Delete entry</button>
        </div>
        <p id="journal-message" class="auth-error" aria-live="polite"></p>
      </form>

      <section class="journal-list-wrap" aria-live="polite">
        <h2>Your Entries</h2>
        <div id="journal-list"></div>
      </section>
    </section>
  </main>

  <script>
    (function () {
      'use strict';

      var currentEntryId = null;
      var entries = [];
      var journalReady = false;

      function setMessage(text, isError, link) {
        var el = document.getElementById('journal-message');
        if (!el) {
          return;
        }
        if (link) {
          el.innerHTML = escapeHtml(text || '') + ' <a href="' + escapeHtml(link) + '" target="_blank" rel="noopener noreferrer">Open index setup</a>';
        } else {
          el.textContent = text || '';
        }
        el.classList.toggle('auth-error', !!isError);
      }

      function formatDate(value) {
        if (!value) {
          return '';
        }
        var date = value && typeof value.toDate === 'function' ? value.toDate() : new Date(value);
        if (Number.isNaN(date.getTime())) {
          return '';
        }
        return date.toLocaleString();
      }

      function escapeHtml(text) {
        return String(text || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function getApi() {
        return window.JegVetAuth;
      }

      function hasJournalApi(api) {
        return !!(api &&
          typeof api.listJournalEntries === 'function' &&
          typeof api.createJournalEntry === 'function' &&
          typeof api.updateJournalEntry === 'function' &&
          typeof api.deleteJournalEntry === 'function');
      }

      function setJournalControlsEnabled(enabled) {
        var saveBtn = document.getElementById('journal-save');
        var newBtn = document.getElementById('journal-new');
        var delBtn = document.getElementById('journal-delete');
        if (saveBtn) {
          saveBtn.disabled = !enabled;
        }
        if (newBtn) {
          newBtn.disabled = !enabled;
        }
        if (delBtn) {
          delBtn.disabled = !enabled;
        }
      }

      function refreshJournalReadiness() {
        var api = getApi();
        journalReady = hasJournalApi(api);
        setJournalControlsEnabled(journalReady);
        if (!journalReady) {
          setMessage('Journal is still loading. If this persists, hard refresh (Ctrl+F5).', true);
        } else if ((document.getElementById('journal-message') || {}).textContent.indexOf('loading') !== -1) {
          setMessage('', false);
        }
      }

      function clearForm() {
        currentEntryId = null;
        document.getElementById('journal-title').value = '';
        document.getElementById('journal-content').value = '';
        setMessage('', false);
        renderList();
      }

      function selectEntry(entryId) {
        var found = entries.find(function (item) { return item.id === entryId; });
        if (!found) {
          return;
        }
        currentEntryId = found.id;
        document.getElementById('journal-title').value = found.title || '';
        document.getElementById('journal-content').value = found.content || '';
        setMessage('Loaded entry.', false);
        renderList();
      }

      function renderList() {
        var wrap = document.getElementById('journal-list');
        if (!wrap) {
          return;
        }
        if (!entries.length) {
          wrap.innerHTML = '<p class="helper-text">No entries yet.</p>';
          return;
        }

        wrap.innerHTML = entries.map(function (entry) {
          var isActive = entry.id === currentEntryId;
          var preview = (entry.content || '').slice(0, 120);
          return (
            '<article class="search-result journal-item' + (isActive ? ' journal-item-active' : '') + '">' +
              '<button type="button" class="journal-item-button" data-entry-id="' + escapeHtml(entry.id) + '">' +
                '<h3 class="search-result-title">' + escapeHtml(entry.title || 'Untitled') + '</h3>' +
                '<p class="search-result-snippet">' + escapeHtml(preview) + (entry.content && entry.content.length > 120 ? '...' : '') + '</p>' +
                '<p class="search-summary">Updated: ' + escapeHtml(formatDate(entry.updatedAt) || '-') + '</p>' +
              '</button>' +
            '</article>'
          );
        }).join('');

        var buttons = wrap.querySelectorAll('.journal-item-button');
        for (var i = 0; i < buttons.length; i += 1) {
          buttons[i].addEventListener('click', function () {
            selectEntry(this.getAttribute('data-entry-id'));
          });
        }
      }

      function loadEntries() {
        var api = getApi();
        if (!hasJournalApi(api)) {
          refreshJournalReadiness();
          return Promise.resolve();
        }
        return api.listJournalEntries().then(function (rows) {
          entries = rows || [];
          if (currentEntryId && !entries.some(function (entry) { return entry.id === currentEntryId; })) {
            currentEntryId = null;
          }
          renderList();
        }).catch(function (error) {
          var msg = error && error.message ? String(error.message) : 'unknown error';
          var linkMatch = msg.match(/https:\/\/\S+/);
          if (/requires an index/i.test(msg) && linkMatch) {
            setMessage('This query needs a Firestore index.', true, linkMatch[0]);
            return;
          }
          setMessage('Could not load entries: ' + msg, true);
        });
      }

      function onSave(event) {
        event.preventDefault();
        var api = getApi();
        if (!hasJournalApi(api)) {
          refreshJournalReadiness();
          return;
        }
        var title = document.getElementById('journal-title').value;
        var content = document.getElementById('journal-content').value;
        if (!String(title || '').trim()) {
          setMessage('Please enter a title.', true);
          return;
        }

        setMessage(currentEntryId ? 'Updating entry...' : 'Saving entry...', false);
        var promise = currentEntryId
          ? api.updateJournalEntry(currentEntryId, title, content)
          : api.createJournalEntry(title, content);

        promise.then(function (result) {
          if (result && result.id) {
            currentEntryId = result.id;
          }
          setMessage('Saved.', false);
          return loadEntries();
        }).catch(function (error) {
          setMessage('Could not save entry: ' + (error && error.message ? error.message : 'unknown error'), true);
        });
      }

      function onDelete() {
        var api = getApi();
        if (!hasJournalApi(api)) {
          refreshJournalReadiness();
          return;
        }
        if (!currentEntryId) {
          setMessage('Select an entry first.', true);
          return;
        }
        if (!window.confirm('Delete this journal entry?')) {
          return;
        }
        setMessage('Deleting entry...', false);
        api.deleteJournalEntry(currentEntryId)
          .then(function () {
            clearForm();
            return loadEntries();
          })
          .then(function () {
            setMessage('Entry deleted.', false);
          })
          .catch(function (error) {
            setMessage('Could not delete entry: ' + (error && error.message ? error.message : 'unknown error'), true);
          });
      }

      function init() {
        var form = document.getElementById('journal-form');
        var newBtn = document.getElementById('journal-new');
        var delBtn = document.getElementById('journal-delete');
        if (form) {
          form.addEventListener('submit', onSave);
        }
        if (newBtn) {
          newBtn.addEventListener('click', clearForm);
        }
        if (delBtn) {
          delBtn.addEventListener('click', onDelete);
        }
        refreshJournalReadiness();
        loadEntries();
        document.addEventListener('jegvet:authchange', function () {
          refreshJournalReadiness();
          loadEntries();
        });
        window.setTimeout(function () {
          refreshJournalReadiness();
          if (journalReady) {
            loadEntries();
          }
        }, 700);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
