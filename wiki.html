<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki | JegVet</title>
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="JegVet" />
  <link rel="icon" type="image/png" href="logo_day_small.png?v=2" />
  <link rel="apple-touch-icon" href="logo_day_small.png?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="auth-guard.js" defer></script>
</head>
<body>
  <main class="page page-top">
    <section class="layout-card layout-card-wide">
      <a href="index.html" class="brand-link" aria-label="Go to homepage">
        <img src="logo_day.png" alt="JegVet logo" class="brand-logo" />
      </a>

      <section class="wiki-layout">
        <nav id="wiki-nav" class="wiki-nav" aria-label="Wiki navigation"></nav>
        <section>
          <div class="wiki-findbar" aria-label="Find in current entry">
            <input id="wiki-find-input" type="search" class="wiki-find-input" placeholder="Find in this entry..." />
            <button id="wiki-find-prev" type="button" class="wiki-find-btn">Prev</button>
            <button id="wiki-find-next" type="button" class="wiki-find-btn">Next</button>
            <span id="wiki-find-count" class="wiki-find-count">0/0</span>
          </div>
          <article id="wiki-article" class="wiki-article">
            <p>Loading wiki content...</p>
          </article>
        </section>
      </section>
    </section>
  </main>

  <script src="wiki/data/wiki-fallback.js" defer></script>
  <script src="wiki/wiki.js" defer></script>
</body>
</html>
