<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Teams | JegVet</title>
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JegVet" />
  <link rel="icon" type="image/png" sizes="32x32" href="logo_day_small_fixed.png?v=4" />
  <link rel="apple-touch-icon" sizes="180x180" href="logo_day_small_fixed.png?v=4" />
  <link rel='manifest' href='manifest.webmanifest' />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="auth-guard.js" defer></script>
  <script src="app-shell.js" defer></script>
</head>
<body>
  <main class="page page-top">
    <section class="layout-card layout-card-wide">
      <h1>Teams</h1>
      <p class="helper-text">Create teams and invite colleagues by email.</p>

      <form id="team-create-form" class="main-form" novalidate>
        <label for="team-name">Team name</label>
        <input id="team-name" class="search-input" type="text" maxlength="80" placeholder="Ex: Internal Medicine Team" required />
        <button type="submit" class="action-button">Create team</button>
      </form>

      <form id="team-invite-form" class="main-form" novalidate>
        <label for="invite-team">Invite to team</label>
        <select id="invite-team" class="search-input"></select>

        <label for="invite-email">Email</label>
        <input id="invite-email" class="search-input" type="email" placeholder="colleague@email.com" required />

        <label for="invite-role">Role</label>
        <select id="invite-role" class="search-input">
          <option value="editor">Editor</option>
          <option value="viewer">Viewer</option>
        </select>

        <button type="submit" class="action-button">Send invite</button>
      </form>
      <p id="teams-message" class="auth-error" aria-live="polite"></p>

      <section class="journal-list-wrap">
        <h2>My Teams</h2>
        <div id="teams-list"></div>
      </section>

      <section class="journal-list-wrap">
        <h2>Pending Invites</h2>
        <div id="invites-list"></div>
      </section>
    </section>
  </main>

  <script>
    (function () {
      'use strict';

      var teams = [];

      function setMessage(text, isError, link) {
        var el = document.getElementById('teams-message');
        if (!el) {
          return;
        }
        if (link) {
          el.innerHTML = escapeHtml(text || '') + ' <a href="' + escapeHtml(link) + '" target="_blank" rel="noopener noreferrer">Create required index</a>';
        } else {
          el.textContent = text || '';
        }
        el.classList.toggle('auth-error', !!isError);
      }

      function escapeHtml(text) {
        return String(text || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function api() {
        return window.JegVetAuth;
      }

      function ready() {
        var a = api();
        return !!(a &&
          typeof a.createTeam === 'function' &&
          typeof a.listTeams === 'function' &&
          typeof a.createTeamInvite === 'function' &&
          typeof a.listPendingInvites === 'function' &&
          typeof a.acceptTeamInvite === 'function');
      }

      function renderTeamSelect() {
        var select = document.getElementById('invite-team');
        if (!select) {
          return;
        }
        if (!teams.length) {
          select.innerHTML = '<option value="">No teams available</option>';
          return;
        }
        select.innerHTML = teams.map(function (team) {
          return '<option value="' + escapeHtml(team.id) + '">' + escapeHtml(team.name + ' (' + team.role + ')') + '</option>';
        }).join('');
      }

      function renderTeamsList() {
        var el = document.getElementById('teams-list');
        if (!el) {
          return;
        }
        if (!teams.length) {
          el.innerHTML = '<p class="helper-text">You are not in any teams yet.</p>';
          return;
        }
        el.innerHTML = teams.map(function (team) {
          return '<article class="search-result"><h3 class="search-result-title">' +
            escapeHtml(team.name) +
            '</h3><p class="search-result-snippet">Role: ' + escapeHtml(team.role) +
            '</p><p class="search-summary">Team ID: ' + escapeHtml(team.id) + '</p></article>';
        }).join('');
      }

      function loadTeams() {
        if (!ready()) {
          setMessage('Teams is still loading. Hard refresh (Ctrl+F5) if needed.', true);
          return Promise.resolve();
        }
        return api().listTeams().then(function (rows) {
          teams = rows || [];
          renderTeamSelect();
          renderTeamsList();
        }).catch(function (error) {
          var msg = error && error.message ? String(error.message) : 'unknown error';
          var linkMatch = msg.match(/https:\/\/\S+/);
          if (/requires a COLLECTION_GROUP_ASC index/i.test(msg) && linkMatch) {
            setMessage('One-time admin setup needed before Teams can be used.', true, linkMatch[0]);
            return;
          }
          setMessage('Could not load teams: ' + msg, true);
        });
      }

      function renderInvites(invites) {
        var el = document.getElementById('invites-list');
        if (!el) {
          return;
        }
        if (!invites.length) {
          el.innerHTML = '<p class="helper-text">No pending invites.</p>';
          return;
        }
        el.innerHTML = invites.map(function (invite) {
          return '<article class="search-result">' +
            '<h3 class="search-result-title">' + escapeHtml(invite.teamId) + '</h3>' +
            '<p class="search-result-snippet">Role: ' + escapeHtml(invite.role) + '</p>' +
            '<button class="button team-accept-btn" data-invite-id="' + escapeHtml(invite.id) + '">Accept invite</button>' +
          '</article>';
        }).join('');

        var btns = el.querySelectorAll('.team-accept-btn');
        for (var i = 0; i < btns.length; i += 1) {
          btns[i].addEventListener('click', function () {
            var inviteId = this.getAttribute('data-invite-id');
            setMessage('Accepting invite...', false);
            api().acceptTeamInvite(inviteId)
              .then(function () {
                setMessage('Invite accepted.', false);
                return Promise.all([loadTeams(), loadInvites()]);
              })
              .catch(function (error) {
                setMessage('Could not accept invite: ' + (error && error.message ? error.message : 'unknown error'), true);
              });
          });
        }
      }

      function loadInvites() {
        if (!ready()) {
          return Promise.resolve();
        }
        return api().listPendingInvites()
          .then(renderInvites)
          .catch(function (error) {
            setMessage('Could not load invites: ' + (error && error.message ? error.message : 'unknown error'), true);
          });
      }

      function init() {
        var createForm = document.getElementById('team-create-form');
        var inviteForm = document.getElementById('team-invite-form');

        if (createForm) {
          createForm.addEventListener('submit', function (event) {
            event.preventDefault();
            if (!ready()) {
              setMessage('Teams is still loading. Hard refresh (Ctrl+F5) if needed.', true);
              return;
            }
            var name = document.getElementById('team-name').value;
            setMessage('Creating team...', false);
            api().createTeam(name)
              .then(function () {
                document.getElementById('team-name').value = '';
                setMessage('Team created.', false);
                return loadTeams();
              })
              .catch(function (error) {
                setMessage('Could not create team: ' + (error && error.message ? error.message : 'unknown error'), true);
              });
          });
        }

        if (inviteForm) {
          inviteForm.addEventListener('submit', function (event) {
            event.preventDefault();
            if (!ready()) {
              setMessage('Teams is still loading. Hard refresh (Ctrl+F5) if needed.', true);
              return;
            }
            var teamId = document.getElementById('invite-team').value;
            var email = document.getElementById('invite-email').value;
            var role = document.getElementById('invite-role').value;
            setMessage('Sending invite...', false);
            api().createTeamInvite(teamId, email, role)
              .then(function () {
                document.getElementById('invite-email').value = '';
                setMessage('Invite sent.', false);
              })
              .catch(function (error) {
                setMessage('Could not send invite: ' + (error && error.message ? error.message : 'unknown error'), true);
              });
          });
        }

        loadTeams().then(loadInvites);
        document.addEventListener('jegvet:authchange', function () {
          loadTeams().then(loadInvites);
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
